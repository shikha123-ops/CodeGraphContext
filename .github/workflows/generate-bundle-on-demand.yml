name: Generate Bundle On-Demand

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL (e.g., https://github.com/owner/repo)'
        required: true
        type: string
      repo_owner:
        description: 'Repository Owner (auto-filled by API)'
        required: false
        type: string
      repo_name:
        description: 'Repository Name (auto-filled by API)'
        required: false
        type: string
      email:
        description: 'Email Address for notifications (auto-filled by API)'
        required: false
        type: string

permissions:
  contents: write  # Required to create/update releases

jobs:
  generate-bundle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout CodeGraphContext
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install CodeGraphContext
        run: |
          uv pip install --system -e .
          uv pip install --system tree-sitter tree-sitter-language-pack huggingface_hub
      
      - name: Parse repository URL
        id: parse-url
        run: |
          REPO_URL="${{ github.event.inputs.repo_url }}"
          
          # Extract owner and repo name from URL
          if [[ "$REPO_URL" =~ github\.com/([^/]+)/([^/]+) ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            # Remove .git suffix if present
            REPO="${REPO%.git}"
          else
            echo "Error: Invalid GitHub URL format"
            exit 1
          fi
          
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "Parsed: $OWNER/$REPO"
      
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}
          path: ${{ steps.parse-url.outputs.repo }}
          fetch-depth: 1
      
      - name: Get repository metadata
        id: repo-meta
        run: |
          cd ${{ steps.parse-url.outputs.repo }}
          
          # Get commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          
          # Try to get the latest tag
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "main")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Get current date
          DATE=$(date +%Y%m%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          
          # Get repository size
          REPO_SIZE=$(du -sh . | cut -f1)
          echo "repo_size=$REPO_SIZE" >> $GITHUB_OUTPUT
      
      - name: Cache CGC Index
        uses: actions/cache@v4
        with:
          path: ~/.codegraphcontext
          key: cgc-index-${{ steps.parse-url.outputs.owner }}-${{ steps.parse-url.outputs.repo }}-${{ steps.repo-meta.outputs.commit_sha }}
          restore-keys: |
            cgc-index-${{ steps.parse-url.outputs.owner }}-${{ steps.parse-url.outputs.repo }}-

      - name: Index repository
        id: index
        run: |
          cd ${{ steps.parse-url.outputs.repo }}
          echo "🔍 Indexing ${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}..."
          
          # Run indexing with timeout (30 minutes max)
          timeout 30m cgc index . || {
            echo "Error: Indexing timed out or failed"
            exit 1
          }
          
          echo "✅ Indexing complete"
      
      - name: Export to .cgc bundle
        id: export
        run: |
          BUNDLE_NAME="cgc__${{ steps.parse-url.outputs.owner }}__${{ steps.parse-url.outputs.repo }}__${{ steps.repo-meta.outputs.tag }}__${{ steps.repo-meta.outputs.commit_short }}.cgc"
          echo "📦 Creating bundle: $BUNDLE_NAME"
          
          cgc bundle export "$BUNDLE_NAME" --repo "$(pwd)/${{ steps.parse-url.outputs.repo }}"
          
          # Get bundle size
          BUNDLE_SIZE=$(du -h "$BUNDLE_NAME" | cut -f1)
          echo "bundle_name=$BUNDLE_NAME" >> $GITHUB_OUTPUT
          echo "bundle_size=$BUNDLE_SIZE" >> $GITHUB_OUTPUT
          
          echo "✅ Bundle created: $BUNDLE_SIZE"
      
      - name: Generate bundle metadata
        run: |
          cat > bundle-metadata.json <<EOF
          {
            "repository": "${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}",
            "commit": "${{ steps.repo-meta.outputs.commit_sha }}",
            "commit_short": "${{ steps.repo-meta.outputs.commit_short }}",
            "tag": "${{ steps.repo-meta.outputs.tag }}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "bundle_name": "${{ steps.export.outputs.bundle_name }}",
            "bundle_size": "${{ steps.export.outputs.bundle_size }}",
            "repo_size": "${{ steps.repo-meta.outputs.repo_size }}",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          
          cat bundle-metadata.json
      
      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.parse-url.outputs.repo }}-bundle
          path: |
            ${{ steps.export.outputs.bundle_name }}
            bundle-metadata.json
          retention-days: 30
      
      - name: Publish to Hugging Face Registry
        shell: python
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ADMIN_WRITE_TOKEN: ${{ secrets.HF_ADMIN_WRITE_TOKEN }}
          HF_REGISTRY_REPO: ${{ vars.HF_REGISTRY_REPO || secrets.HF_REGISTRY_REPO || 'codegraphcontext/registry' }}
        run: |
          import os
          import json
          import base64
          import requests
          from datetime import datetime, timezone
          from pathlib import Path
          from huggingface_hub import HfApi

          hf_token = os.environ.get("HF_TOKEN") or os.environ.get("HF_ADMIN_WRITE_TOKEN")
          if not hf_token:
              print("Error: Hugging Face token is missing. Please set HF_TOKEN or HF_ADMIN_WRITE_TOKEN in secrets.")
              exit(1)

          hf_repo = os.environ.get("HF_REGISTRY_REPO", "codegraphcontext/registry")
          api = HfApi(token=hf_token)

          # 1. Base64 encode the .cgc file
          bundle_name = "${{ steps.export.outputs.bundle_name }}"
          bundle_path = Path(bundle_name)
          base64_filename = bundle_path.name.replace(".cgc", "") + ".cgc.base64"
          base64_path = Path("bundles") / base64_filename
          base64_path.parent.mkdir(exist_ok=True)

          with open(bundle_path, "rb") as f:
              cgc_data = f.read()

          base64_data = base64.b64encode(cgc_data)
          with open(base64_path, "wb") as f:
              f.write(base64_data)

          print(f"Base64 encoded {bundle_path} -> {base64_path}")

          # 2. Fetch the current manifest from Hugging Face
          manifest_path = Path("manifest.json")
          manifest_url = f"https://huggingface.co/datasets/{hf_repo}/raw/main/manifest.json"
          try:
              headers = {"Authorization": f"Bearer {hf_token}"}
              r = requests.get(manifest_url, headers=headers, timeout=10)
              if r.status_code == 200:
                  manifest = r.json()
              else:
                  print(f"Manifest fetch returned status {r.status_code}. Starting fresh.")
                  manifest = {"bundles": []}
          except Exception as e:
              print(f"No existing manifest found or failed to download: {e}. Starting fresh.")
              manifest = {"bundles": []}

          # 3. Compile the new entry
          repo_owner = "${{ steps.parse-url.outputs.owner }}"
          repo_name = "${{ steps.parse-url.outputs.repo }}"
          repo_full = f"{repo_owner}/{repo_name}"
          clean_repo_name = repo_full.replace("/", "_")
          version = "${{ steps.repo-meta.outputs.tag }}"
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          new_entry = {
              "name": repo_name,
              "repo": repo_full,
              "bundle_name": base64_filename,
              "version": version,
              "size": "${{ steps.export.outputs.bundle_size }}",
              "download_url": f"https://huggingface.co/datasets/{hf_repo}/resolve/main/bundles/{base64_filename}",
              "generated_at": generated_at,
              "source": "server-indexed"
          }

          # De-duplicate existing entries
          manifest["bundles"] = [
              b for b in manifest.get("bundles", [])
              if not (b.get("repo", "").lower() == repo_full.lower() and b.get("version") == version)
          ]
          manifest["bundles"].append(new_entry)

          # Write updated manifest locally
          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          print("Manifest updated successfully.")

          # 4. Upload the files to Hugging Face dataset
          # Upload base64 bundle
          api.upload_file(
              path_or_fileobj=str(base64_path),
              path_in_repo=f"bundles/{base64_filename}",
              repo_id=hf_repo,
              repo_type="dataset",
          )
          print("Uploaded base64 bundle to HF.")

          # Upload manifest.json
          api.upload_file(
              path_or_fileobj=str(manifest_path),
              path_in_repo="manifest.json",
              repo_id=hf_repo,
              repo_type="dataset",
          )
          print("Uploaded manifest.json to HF. Migration to HF successful!")
      
      - name: Send completion notification email
        if: ${{ github.event.inputs.email != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎉 CGC Bundle Ready: ${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}"
          to: ${{ github.event.inputs.email }}
          from: CodeGraphContext <noreply@yourdomain.com>
          body: |
            Your code graph index is ready!
            
            Repository: ${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}
            Bundle: ${{ steps.export.outputs.bundle_name }}
            Size: ${{ steps.export.outputs.bundle_size }}
            
            You can load this bundle into your local CodeGraphContext CLI database using:
            
            cgc load ${{ steps.export.outputs.bundle_name }}
            
            Or view it directly online in the explorer.
      
      - name: Summary
        run: |
          echo "## 🎉 Bundle Generation Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ steps.parse-url.outputs.owner }}/${{ steps.parse-url.outputs.repo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle**: ${{ steps.export.outputs.bundle_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size**: ${{ steps.export.outputs.bundle_size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download and CLI usage" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# The bundle is indexed and hosted directly on the Hugging Face dataset registry!" >> $GITHUB_STEP_SUMMARY
          echo "cgc registry download ${{ steps.export.outputs.bundle_name }}" >> $GITHUB_STEP_SUMMARY
          echo "cgc load ${{ steps.export.outputs.bundle_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
